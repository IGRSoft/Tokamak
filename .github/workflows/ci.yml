name: CI

on:
  push:
    branches: ["feature/swift-6.3-wasip1", "main"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    name: Build (host + wasm)
    runs-on: ubuntu-latest
    container: swift:6.3.2
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift SDK for WebAssembly
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c

      - name: Build TokamakStaticHTML (host / SSR path)
        run: swift build --target TokamakStaticHTML

      - name: Build TokamakDOM (wasm)
        run: swift build --target TokamakDOM --swift-sdk swift-6.3.2-RELEASE_wasm

      - name: Bundle TokamakDemo (wasm, PackageToJS)
        run: swift package --swift-sdk swift-6.3.2-RELEASE_wasm --disable-sandbox js --product TokamakDemo -c release --use-cdn

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t igrsoft/tokamak-web:ci .
