name: Documentation

# Builds the DocC documentation for TokamakCore (the API home — the renderer
# modules re-export its symbols) and publishes it to GitHub Pages. This job is
# decoupled from CI: it runs only on pushes to main and on manual dispatch, so
# it never gates pull-request checks. Swift Package Index additionally hosts the
# per-renderer docs via .spi.yml.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC archive
    runs-on: ubuntu-latest
    container: swift:6.3.2
    steps:
      - uses: actions/checkout@v4

      - name: Generate documentation
        run: |
          swift package --allow-writing-to-directory ./docs-site \
            generate-documentation \
            --target TokamakCore \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path Tokamak \
            --output-path ./docs-site

      - name: Add index redirect
        run: |
          echo '<script>location.href="/Tokamak/documentation/tokamakcore"</script>' > ./docs-site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
